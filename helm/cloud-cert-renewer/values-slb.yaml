# Example values file for Load Balancer certificate renewal
serviceType: lb # or use slb (backward compatible)

image:
  repository: cloud-cert-renewer
  tag: latest
  pullPolicy: IfNotPresent

# Image pull secrets (for private registries)
# Uncomment and configure if using private registry:
# imagePullSecrets:
#   - regcred

# Load Balancer configuration (new name, preferred)
lb:
  # Instance ID can be specified as a YAML list (preferred) or comma-separated string (backward compatible)
  # List format (recommended):
  instanceId:
    - lb-xxxxxxxxx
  # Or use comma-separated string (backward compatible):
  # instanceId: lb-xxxxxxxxx
  listenerPort: 443
  region: cn-hangzhou
  # Structured listeners: independent instanceId/port pairs (optional, takes precedence when set)
  # When listeners is specified, instanceId and listenerPort are used as fallback only.
  # listeners:
  #   - instanceId: lb-aaa
  #     listenerPort: 443
  #   - instanceId: lb-bbb
  #     listenerPort: 8443

# SLB configuration (old name, backward compatible)
slb:
  instanceId: lb-xxxxxxxxx
  listenerPort: 443
  region: cn-hangzhou

secrets:
  # Use generic naming (recommended)
  cloudCredentials:
    name: cloud-credentials
  # Or use old naming (backward compatible)
  # alibabaCloudCredentials:
  #   name: alibaba-cloud-credentials
  certificate:
    name: cert-secret

reloader:
  enabled: true
